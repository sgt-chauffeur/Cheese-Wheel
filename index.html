<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tomato</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(270deg,#0f2027,#203a43,#2c5364,#1a2a6c,#b21f1f,#fdbb2d);
    background-size:1200% 1200%;
    animation:gradientMove 20s ease infinite;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.1);
    padding:60px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h1{
    font-size:120px;
    color:#00ff00;
    text-shadow:
        0 0 10px #4da6ff,
        0 0 20px #4da6ff;
    animation:glowPulse 3s infinite alternate;
    margin:0 0 30px 0;
}

@keyframes glowPulse{
    from{transform:scale(1);}
    to{transform:scale(1.08);}
}

img{
    width:300px;
    border-radius:20px;
    box-shadow:0 0 20px #000;
    transition:all 0.6s ease;
}

img:hover{
    transform:scale(1.2) rotate(5deg);
    box-shadow:
        0 0 20px #fff,
        0 0 40px #00e5ff,
        0 0 60px #00e5ff;
}

.sparkle{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0);
        opacity:0;
    }
    50%{
        opacity:1;
    }
    to{
        transform:translateY(-10vh) scale(1);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container">
    <h1>Glup</h1>
    <img src="thing.jpg">
</div>

<!-- Sparkle particles -->
<div class="sparkle" style="left:10%;animation-delay:0s;"></div>
<div class="sparkle" style="left:20%;animation-delay:2s;"></div>
<div class="sparkle" style="left:30%;animation-delay:4s;"></div>
<div class="sparkle" style="left:40%;animation-delay:1s;"></div>
<div class="sparkle" style="left:50%;animation-delay:3s;"></div>
<div class="sparkle" style="left:60%;animation-delay:5s;"></div>
<div class="sparkle" style="left:70%;animation-delay:2s;"></div>
<div class="sparkle" style="left:80%;animation-delay:4s;"></div>
<div class="sparkle" style="left:90%;animation-delay:1s;"></div>

</body>
</html>

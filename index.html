<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Glow Media Page</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    background:#050505;
    overflow:hidden;
}

/* glowing red animated background */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,0,0,0.4), transparent 40%),
        radial-gradient(circle at 80% 60%, rgba(255,0,0,0.35), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(255,0,0,0.25), transparent 40%);
    animation:moveGlow 18s infinite linear;
    filter:blur(80px);
    z-index:-1;
}

@keyframes moveGlow{
    0%{transform:translate(0,0);}
    50%{transform:translate(-20%, -10%);}
    100%{transform:translate(0,0);}
}

/* glass card */
.container{
    background:rgba(20,20,20,0.7);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,0,0,0.3);
    box-shadow:0 0 40px rgba(255,0,0,0.35);
    border-radius:16px;
    padding:40px;
    width:700px;
    text-align:center;
}

h1{
    color:#ff4d4d;
    text-shadow:0 0 15px red;
}

img{
    width:100%;
    border-radius:10px;
    margin-top:20px;
    box-shadow:0 0 20px rgba(255,0,0,0.5);
}

video{
    width:100%;
    margin-top:25px;
    border-radius:10px;
    box-shadow:0 0 25px rgba(255,0,0,0.6);
}

</style>
</head>

<body>

<div class="container">
    <h1>&lt;&frasl;&gt;</h1>

    <img src="files/thing.jpg" alt="Image" width="200">

    <video controls>
        <source src="files/movie.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</div>

</body>
</html>
